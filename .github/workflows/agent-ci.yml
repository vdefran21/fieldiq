name: Agent CI
on:
  push:
    paths: ['agent/**']
  pull_request:
    paths: ['agent/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install and test
        working-directory: agent
        run: |
          npm ci
          npm test
        env:
          ANTHROPIC_API_KEY: test-key
          AWS_ENDPOINT_URL: http://localhost:4566
