spring:
  application:
    name: fieldiq-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/fieldiq}
    username: ${DATABASE_USERNAME:fieldiq}
    password: ${DATABASE_PASSWORD:localdev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics

fieldiq:
  instance:
    id: ${FIELDIQ_INSTANCE_ID:local-dev}
    secret: ${FIELDIQ_INSTANCE_SECRET:dev-instance-secret-change-in-production}
    base-url: ${FIELDIQ_INSTANCE_BASE_URL:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production!}
    expiration-ms: 900000        # 15 minutes
    refresh-expiration-ms: 2592000000  # 30 days
  aws:
    endpoint-url: ${AWS_ENDPOINT_URL:http://localhost:4566}
    region: ${AWS_REGION:us-east-1}
    sqs:
      agent-tasks-queue: ${AGENT_TASKS_QUEUE_URL:http://localhost:4566/000000000000/fieldiq-agent-tasks}
      notifications-queue: ${NOTIFICATIONS_QUEUE_URL:http://localhost:4566/000000000000/fieldiq-notifications}
      negotiation-queue: ${NEGOTIATION_QUEUE_URL:http://localhost:4566/000000000000/fieldiq-negotiation}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}
  websocket:
    allowed-origin-patterns:
      - ${FIELDIQ_WS_ALLOWED_ORIGIN_1:http://localhost:8080}
      - ${FIELDIQ_WS_ALLOWED_ORIGIN_2:http://localhost:8081}
      - ${FIELDIQ_WS_ALLOWED_ORIGIN_3:http://localhost:19006}
      - ${FIELDIQ_WS_ALLOWED_ORIGIN_4:exp://*}
  encryption:
    token-key: ${TOKEN_ENCRYPTION_KEY:dev-token-encryption-key-change-in-production!32}
